<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
    <defs>
        <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#0d1a10"/>
            <stop offset="100%" stop-color="#0a0a1e"/>
        </linearGradient>
        <radialGradient id="ring" cx="0.5" cy="0.5" r="0.35">
            <stop offset="60%" stop-color="#9b6dff10"/>
            <stop offset="100%" stop-color="#9b6dff00"/>
        </radialGradient>
    </defs>
    <rect width="400" height="400" fill="url(#bg)"/>
    <circle cx="200" cy="250" r="140" fill="url(#ring)"/>
    <!-- Fairy ring of mushrooms -->
    <g fill="#8b4040" opacity="0.9">
        <ellipse cx="120" cy="280" rx="12" ry="8"/>
        <rect x="118" y="280" width="4" height="10" fill="#6a3030"/>
        <ellipse cx="160" cy="310" rx="10" ry="7"/>
        <rect x="158" y="310" width="4" height="8" fill="#6a3030"/>
        <ellipse cx="210" cy="320" rx="11" ry="7"/>
        <rect x="208" y="320" width="4" height="9" fill="#6a3030"/>
        <ellipse cx="260" cy="310" rx="12" ry="8"/>
        <rect x="258" y="310" width="4" height="10" fill="#6a3030"/>
        <ellipse cx="290" cy="280" rx="10" ry="7"/>
        <rect x="288" y="280" width="4" height="8" fill="#6a3030"/>
        <ellipse cx="280" cy="240" rx="11" ry="7"/>
        <rect x="278" y="240" width="4" height="9" fill="#6a3030"/>
        <ellipse cx="240" cy="210" rx="12" ry="8"/>
        <rect x="238" y="210" width="4" height="10" fill="#6a3030"/>
        <ellipse cx="180" cy="210" rx="10" ry="7"/>
        <rect x="178" y="210" width="4" height="8" fill="#6a3030"/>
        <ellipse cx="130" cy="240" rx="11" ry="7"/>
        <rect x="128" y="240" width="4" height="9" fill="#6a3030"/>
    </g>
    <!-- Mushroom spots -->
    <circle cx="120" cy="277" r="2" fill="#fff" opacity="0.5"/>
    <circle cx="210" cy="317" r="2" fill="#fff" opacity="0.5"/>
    <circle cx="290" cy="277" r="2" fill="#fff" opacity="0.5"/>
    <!-- Portal glow in center -->
    <circle cx="200" cy="260" r="40" fill="#9b6dff" opacity="0.08">
        <animate attributeName="r" values="40;50;40" dur="4s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.08;0.15;0.08" dur="4s" repeatCount="indefinite"/>
    </circle>
    <!-- Stars -->
    <circle cx="80" cy="60" r="1.5" fill="#d4a843" opacity="0.5"/>
    <circle cx="320" cy="40" r="1" fill="#fff" opacity="0.7"/>
    <circle cx="200" cy="80" r="1" fill="#9b6dff" opacity="0.4"/>
</svg>
