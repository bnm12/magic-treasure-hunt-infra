<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
    <defs>
        <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#0a0a2e"/>
            <stop offset="100%" stop-color="#0d2020"/>
        </linearGradient>
        <linearGradient id="water" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#0a2a3a"/>
            <stop offset="50%" stop-color="#1a3a4a"/>
            <stop offset="100%" stop-color="#0a2a3a"/>
        </linearGradient>
    </defs>
    <rect width="400" height="400" fill="url(#bg)"/>
    <!-- Water -->
    <rect x="0" y="280" width="400" height="120" fill="url(#water)"/>
    <!-- Bridge arch -->
    <path d="M80 280 Q200 180 320 280" stroke="#4a4a3a" stroke-width="20" fill="none"/>
    <path d="M80 280 Q200 190 320 280" stroke="#5a5a4a" stroke-width="14" fill="none"/>
    <!-- Moss dots -->
    <circle cx="140" cy="240" r="5" fill="#2a6b3a" opacity="0.7"/>
    <circle cx="200" cy="220" r="4" fill="#1f5530" opacity="0.6"/>
    <circle cx="260" cy="240" r="6" fill="#2a6b3a" opacity="0.7"/>
    <circle cx="170" cy="230" r="3" fill="#1a4a28" opacity="0.5"/>
    <!-- Troll eyes under bridge -->
    <circle cx="180" cy="290" r="3" fill="#d4a843" opacity="0.5">
        <animate attributeName="opacity" values="0.5;0;0.5" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="195" cy="290" r="3" fill="#d4a843" opacity="0.5">
        <animate attributeName="opacity" values="0.5;0;0.5" dur="4s" repeatCount="indefinite"/>
    </circle>
    <!-- Water reflections -->
    <line x1="100" y1="320" x2="150" y2="320" stroke="#9b6dff" stroke-width="1" opacity="0.2"/>
    <line x1="200" y1="340" x2="280" y2="340" stroke="#9b6dff" stroke-width="1" opacity="0.15"/>
    <!-- Stars -->
    <circle cx="50" cy="40" r="1.5" fill="#fff" opacity="0.7"/>
    <circle cx="350" cy="60" r="1" fill="#d4a843" opacity="0.5"/>
</svg>
