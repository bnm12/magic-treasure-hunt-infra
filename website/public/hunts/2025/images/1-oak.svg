<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
    <defs>
        <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#0d1f15"/>
            <stop offset="100%" stop-color="#0a0a2e"/>
        </linearGradient>
        <radialGradient id="g" cx="0.5" cy="0.6" r="0.4">
            <stop offset="0%" stop-color="#2a6b3a30"/>
            <stop offset="100%" stop-color="#00000000"/>
        </radialGradient>
    </defs>
    <rect width="400" height="400" fill="url(#bg)"/>
    <circle cx="200" cy="240" r="160" fill="url(#g)"/>
    <!-- Tree trunk -->
    <rect x="185" y="200" width="30" height="120" rx="4" fill="#3d2b1a"/>
    <!-- Canopy -->
    <ellipse cx="200" cy="170" rx="90" ry="80" fill="#1a4a28" opacity="0.9"/>
    <ellipse cx="200" cy="160" rx="70" ry="65" fill="#1f5530" opacity="0.8"/>
    <!-- Roots with runes -->
    <path d="M170 320 Q160 340 140 350" stroke="#3d2b1a" stroke-width="8" fill="none" stroke-linecap="round"/>
    <path d="M215 320 Q230 340 260 350" stroke="#3d2b1a" stroke-width="8" fill="none" stroke-linecap="round"/>
    <!-- Rune glows -->
    <circle cx="160" cy="340" r="4" fill="#d4a843" opacity="0.7">
        <animate attributeName="opacity" values="0.7;0.3;0.7" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="240" cy="345" r="3" fill="#d4a843" opacity="0.5">
        <animate attributeName="opacity" values="0.5;0.8;0.5" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <!-- Stars -->
    <circle cx="60" cy="50" r="1.5" fill="#fff" opacity="0.6"/>
    <circle cx="320" cy="80" r="1" fill="#d4a843" opacity="0.5"/>
    <circle cx="350" cy="40" r="1.5" fill="#9b6dff" opacity="0.4"/>
</svg>
