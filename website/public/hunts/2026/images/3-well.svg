<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
    <defs>
        <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#0a0a2e"/>
            <stop offset="100%" stop-color="#0d1a1a"/>
        </linearGradient>
        <radialGradient id="waterglow" cx="0.5" cy="0.7" r="0.25">
            <stop offset="0%" stop-color="#4a9aba30"/>
            <stop offset="100%" stop-color="#4a9aba00"/>
        </radialGradient>
    </defs>
    <rect width="400" height="400" fill="url(#bg)"/>
    <circle cx="200" cy="280" r="100" fill="url(#waterglow)"/>
    <!-- Well walls (circular stone) -->
    <ellipse cx="200" cy="260" rx="70" ry="25" fill="#4a4a5a" stroke="#3a3a4a" stroke-width="3"/>
    <rect x="130" y="240" width="140" height="25" fill="#4a4a5a"/>
    <ellipse cx="200" cy="240" rx="70" ry="25" fill="#5a5a6a" stroke="#3a3a4a" stroke-width="2"/>
    <!-- Well interior (dark water) -->
    <ellipse cx="200" cy="240" rx="55" ry="18" fill="#0a1a2a"/>
    <!-- Glowing water -->
    <ellipse cx="200" cy="240" rx="40" ry="12" fill="#2a5a7a" opacity="0.3">
        <animate attributeName="opacity" values="0.3;0.5;0.3" dur="3s" repeatCount="indefinite"/>
    </ellipse>
    <!-- Well roof supports -->
    <rect x="140" y="140" width="6" height="100" fill="#3a2a1a"/>
    <rect x="254" y="140" width="6" height="100" fill="#3a2a1a"/>
    <!-- Well roof -->
    <polygon points="200,100 120,145 280,145" fill="#3a2a20"/>
    <polygon points="200,110 130,145 270,145" fill="#4a3a2a"/>
    <!-- Rope and bucket -->
    <line x1="200" y1="120" x2="200" y2="200" stroke="#6a5a3a" stroke-width="2"/>
    <rect x="190" y="200" width="20" height="15" fill="#4a3a2a" rx="2"/>
    <!-- Whisper wisps -->
    <path d="M180 230 Q170 210 180 190" stroke="#9b6dff" stroke-width="1" fill="none" opacity="0.2">
        <animate attributeName="opacity" values="0.2;0.4;0.2" dur="4s" repeatCount="indefinite"/>
    </path>
    <path d="M220 225 Q230 205 220 185" stroke="#9b6dff" stroke-width="1" fill="none" opacity="0.15">
        <animate attributeName="opacity" values="0.15;0.35;0.15" dur="3.5s" repeatCount="indefinite"/>
    </path>
    <!-- Stars -->
    <circle cx="60" cy="40" r="1.5" fill="#fff" opacity="0.6"/>
    <circle cx="340" cy="60" r="1" fill="#d4a843" opacity="0.5"/>
    <circle cx="110" cy="80" r="1" fill="#9b6dff" opacity="0.4"/>
</svg>
