<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Magic Spot Configuration - Redirecting...</title>
    <script>
      (function() {
        const url = new URL(window.location.href);
        const redirectUrl = new URL("../management.html", window.location.href);
        redirectUrl.searchParams.set("configureSpot", "");
        // Forward any other query params if needed
        for (const [key, value] of url.searchParams) {
          if (key !== "configureSpot") {
            redirectUrl.searchParams.set(key, value);
          }
        }
        window.location.replace(redirectUrl.toString());
      })();
    </script>
  </head>
  <body>
    <p>Redirecting to Magic Spot Configuration...</p>
  </body>
</html>
